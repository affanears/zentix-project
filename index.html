<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentix - Tes Kepribadian</title>

  <!-- Font Modern -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main">

  <!-- LEFT SIDE (Branding) -->
  <div class="left">
    <img src="logo.png" alt="Zentix Logo" class="logo">
    <h1>ZENTIX</h1>
    <p>Tes Kepribadian Modern untuk Mengenal Dirimu Lebih Dalam</p>
  </div>

  <!-- RIGHT SIDE (Form) -->
  <div class="right">

    <form id="userForm" class="card">
      <h2>Mulai Tes</h2>

      <input type="email" id="email" placeholder="Email" required>

      <input type="text" id="nickname" placeholder="Nama Panggilan" required>

      <select id="gender" required>
        <option value="">Pilih Gender</option>
        <option value="Laki-laki">Laki-laki</option>
        <option value="Perempuan">Perempuan</option>
      </select>

      <input type="date" id="birthdate" required>

      <button type="submit">Mulai Tes</button>
    </form>

    <p id="status"></p>

  </div>

</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
